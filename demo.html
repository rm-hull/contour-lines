<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>UK Contour Lines</title>
    <meta
      name="viewport"
      content="initial-scale=1,maximum-scale=1,user-scalable=no"
    />
    <script src="https://unpkg.com/maplibre-gl/dist/maplibre-gl.js"></script>
    <link
      href="https://unpkg.com/maplibre-gl/dist/maplibre-gl.css"
      rel="stylesheet"
    />
    <style>
      body {
        margin: 0;
        padding: 0;
      }
      #map {
        position: absolute;
        top: 0;
        bottom: 0;
        width: 100%;
      }
      #zoom-display {
        position: absolute;
        bottom: 40px;
        right: 10px;
        background: rgba(255, 255, 255, 0.9);
        padding: 4px 8px;
        border-radius: 4px;
        font-family: sans-serif;
        font-size: 12px;
        color: #333;
        box-shadow: 0 1px 4px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div id="map"></div>
    <div id="zoom-display">Zoom: 12</div>
    <script>
      const map = new maplibregl.Map({
        container: "map",
        style: "http://localhost:8080/styles/uk_contours/style.json",
        center: [-1.5, 53.5],
        zoom: 12,
      });

      const zoomDisplay = document.getElementById("zoom-display");
      const updateZoom = () => {
        zoomDisplay.textContent = `Zoom: ${map.getZoom().toFixed(2)}`;
      };

      map.on("zoom", updateZoom);
      map.on("load", () => {
        const withinUK = [
          "within",
          {
            type: "Feature",
            geometry: {
              type: "Polygon",
              coordinates: [
                [
                  [-8.5, 49.5],
                  [2.0, 49.5],
                  [2.0, 61.0],
                  [-8.5, 61.0],
                  [-8.5, 49.5],
                ],
              ],
            },
          },
        ];

        updateZoom();

        // 1. Background (sea)
        map.addLayer(
          {
            id: "background",
            type: "background",
            paint: { "background-color": "#dbeafe" },
          },
          "contour-lines",
        );

        // 2. UK boundary source
        map.addSource("uk-boundary", {
          type: "vector",
          url: "http://localhost:8080/data/uk_boundary.json",
        });

        // 3. Land fill
        map.addLayer(
          {
            id: "uk-fill",
            type: "fill",
            source: "uk-boundary",
            "source-layer": "uk_boundary",
            paint: { "fill-color": "#f8f4f0", "fill-opacity": 1 },
          },
          "contour-lines",
        );

        // 4. UK outline
        map.addLayer(
          {
            id: "uk-outline",
            type: "line",
            source: "uk-boundary",
            "source-layer": "uk_boundary",
            paint: { "line-color": "#94a3b8", "line-width": 1 },
          },
          "contour-lines",
        );

        // 5. OpenFreeMap vector tiles — no API key needed
        map.addSource("ofm", {
          type: "vector",
          url: "https://tiles.openfreemap.org/planet",
        });

        // Motorways
        map.addLayer({
          id: "roads-motorway",
          type: "line",
          source: "ofm",
          "source-layer": "transportation",
          filter: ["all", ["==", ["get", "class"], "motorway"], withinUK],
          minzoom: 5,
          layout: { "line-join": "round", "line-cap": "round" },
          paint: {
            "line-color": "#6366f1",
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              5,
              1,
              10,
              3,
              14,
              6,
            ],
            "line-opacity": 0.85,
          },
        });

        // Trunk (A-roads)
        map.addLayer({
          id: "roads-trunk",
          type: "line",
          source: "ofm",
          "source-layer": "transportation",
          filter: ["all", ["==", ["get", "class"], "trunk"], withinUK],
          minzoom: 6,
          layout: { "line-join": "round", "line-cap": "round" },
          paint: {
            "line-color": "#f97316",
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              6,
              1,
              10,
              2.5,
              14,
              5,
            ],
            "line-opacity": 0.8,
          },
        });

        // Primary (A-roads)
        map.addLayer({
          id: "roads-primary",
          type: "line",
          source: "ofm",
          "source-layer": "transportation",
          filter: ["all", ["==", ["get", "class"], "primary"], withinUK],
          minzoom: 7,
          layout: { "line-join": "round", "line-cap": "round" },
          paint: {
            "line-color": "#fbbf24",
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              7,
              0.5,
              10,
              2,
              14,
              4.5,
            ],
            "line-opacity": 0.8,
          },
        });
        // B-roads (secondary)
        map.addLayer({
          id: "roads-secondary",
          type: "line",
          source: "ofm",
          "source-layer": "transportation",
          filter: ["all", ["==", ["get", "class"], "secondary"], withinUK],
          minzoom: 9,
          layout: { "line-join": "round", "line-cap": "round" },
          paint: {
            "line-color": "#84cc16",
            "line-width": [
              "interpolate",
              ["linear"],
              ["zoom"],
              9,
              0.5,
              12,
              2,
              14,
              4,
            ],
            "line-opacity": 0.75,
          },
        });

        // 7. City labels
        map.addLayer({
          id: "place-city",
          type: "symbol",
          source: "ofm",
          "source-layer": "place",
          filter: ["all", ["==", ["get", "class"], "city"], withinUK],
          minzoom: 5,
          maxzoom: 14,
          layout: {
            "text-field": ["get", "name:en"],
            "text-font": ["Open Sans Bold"],
            "text-size": ["interpolate", ["linear"], ["zoom"], 6, 12, 14, 16],
            "text-anchor": "center",
            "text-max-width": 8,
          },
          paint: {
            "text-color": "#1e293b",
            "text-halo-color": "#f8f4f0",
            "text-halo-width": 1.5,
          },
        });

        // 8. Town labels
        map.addLayer({
          id: "place-town",
          type: "symbol",
          source: "ofm",
          "source-layer": "place",
          filter: ["all", ["==", ["get", "class"], "town"], withinUK],
          minzoom: 8,
          maxzoom: 16,
          layout: {
            "text-field": ["get", "name:en"],
            "text-font": ["Open Sans Regular"],
            "text-size": ["interpolate", ["linear"], ["zoom"], 6, 10, 14, 16],
            "text-anchor": "center",
            "text-max-width": 8,
          },
          paint: {
            "text-color": "#334155",
            "text-halo-color": "#f8f4f0",
            "text-halo-width": 1.5,
          },
        });

        // 9. Village labels
        map.addLayer({
          id: "place-village",
          type: "symbol",
          source: "ofm",
          "source-layer": "place",
          filter: ["all", ["==", ["get", "class"], "village"], withinUK],
          minzoom: 11,
          layout: {
            "text-field": ["get", "name:en"],
            "text-font": ["Open Sans Regular"],
            "text-size": ["interpolate", ["linear"], ["zoom"], 11, 10, 16, 13],
            "text-anchor": "center",
            "text-max-width": 6,
          },
          paint: {
            "text-color": "#475569",
            "text-halo-color": "#f8f4f0",
            "text-halo-width": 1.5,
          },
        });
      });

      map.on("error", (e) => console.error("MapLibre error:", e.error));
      map.addControl(new maplibregl.NavigationControl(), "top-right");
      map.addControl(
        new maplibregl.ScaleControl({ maxWidth: 200, unit: "metric" }),
      );
    </script>
  </body>
</html>
